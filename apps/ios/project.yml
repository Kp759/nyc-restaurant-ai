name: BiteNYC
options:
  bundleIdPrefix: com.bitenyc
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: en
    GENERATE_INFOPLIST_FILE: NO

targets:
  BiteNYC:
    type: application
    platform: iOS
    sources:
      - path: BiteNYC
    entitlements:
      path: BiteNYC/BiteNYC.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bitenyc.app
        INFOPLIST_FILE: BiteNYC/Info.plist
        CODE_SIGN_ENTITLEMENTS: BiteNYC/BiteNYC.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    capabilities:
      Sign In with Apple: true
